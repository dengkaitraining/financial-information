# ==============================================================================
# Apache HTTPD 反向代理 使用者自定義設定檔 (httpd-custom.conf)
# 說明：配置 Proxy 模組、Vue 儀表板 (/tech-stack)、Django 根目錄 (/) 與路由轉接
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 載入必備之 Apache 模組 (Dynamic Shared Objects)
# ------------------------------------------------------------------------------
# 載入基礎反向代理模組
LoadModule proxy_module modules/mod_proxy.so
# 載入 HTTP 協定代理模組
LoadModule proxy_http_module modules/mod_proxy_http.so
# 載入 WebSocket 協定代理模組 (供 Vite 開發伺服器 HMR 使用)
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so

# ------------------------------------------------------------------------------
# 2. 伺服器全局變數與代理選項 (Options)
# ------------------------------------------------------------------------------
ServerName localhost

# 關閉正向代理，提升反向代理安全性
ProxyRequests Off

# 保持原始 HTTP Host 標頭傳遞至後端容器
ProxyPreserveHost On

# ------------------------------------------------------------------------------
# 3. 反向代理路由規則定義 (Reverse Proxy Routes)
# ------------------------------------------------------------------------------

# [Vue 代理] Vite 開發伺服器熱模組替換 (HMR) WebSocket 連線轉接
<Location /tech-stack/_hmr>
    ProxyPass ws://fin-frontend:5173/tech-stack/_hmr
    ProxyPassReverse ws://fin-frontend:5173/tech-stack/_hmr
</Location>

# [Vue 代理] Vue.js 3.5 資訊系統開發環境儀表板 (/tech-stack 與 /tech-stack/)
<Location /tech-stack>
    ProxyPass http://fin-frontend:5173/tech-stack
    ProxyPassReverse http://fin-frontend:5173/tech-stack
</Location>

# [Django 代理] Django Unfold 後台管理介面 (/admin)
ProxyPass /admin http://fin-backend:8000/admin
ProxyPassReverse /admin http://fin-backend:8000/admin

# [Django 代理] Django 靜態資源檔 (/static)
ProxyPass /static http://fin-backend:8000/static
ProxyPassReverse /static http://fin-backend:8000/static

# [Django 代理] Django 後端健康檢查 JSON API (/api)
ProxyPass /api http://fin-backend:8000/api
ProxyPassReverse /api http://fin-backend:8000/api

# [Django 代理] 預設根路由 (/) 轉接至 Django 顯示啟用純文字
ProxyPass / http://fin-backend:8000/
ProxyPassReverse / http://fin-backend:8000/
