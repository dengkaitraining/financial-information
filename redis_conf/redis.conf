# ==============================================================================
# Redis 快取伺服器 使用者自定義設定檔 (redis.conf)
# 說明：配置記憶體上限、快取淘汰策略、網路綁定與長連線調校
# ==============================================================================

# 綁定全網路介面以利 Docker 內部 Bridge 網路存取
bind 0.0.0.0

# 關閉保護模式 (保護由 Docker 內部 bridge 網路隔離層負責)
protected-mode no

# 預設連線 Port 號
port 6379

# ------------------------------------------------------------------------------
# 記憶體管理與快取淘汰策略 (Maxmemory & Eviction Policy)
# ------------------------------------------------------------------------------
# 限制最高記憶體使用量為 256MB，防止高併發存取時吃滿系統記憶體資源
maxmemory 256mb

# 當記憶體滿時，自動移除設定有過期時間 (TTL) 且最少使用的 Key (Least Recently Used)
maxmemory-policy volatile-lru

# ------------------------------------------------------------------------------
# 快取持久化策略 (RDB Snapshot Settings)
# ------------------------------------------------------------------------------
# 當 60 秒內至少有 1 次寫入時，自動將記憶體快照寫入磁碟檔 dump.rdb
save 60 1
save 300 10

# 快照檔案名稱與工作目錄
dbfilename dump.rdb
dir /data

# ------------------------------------------------------------------------------
# 網路長連線與效能調校
# ------------------------------------------------------------------------------
# 開啟 TCP Keepalive (每 300 秒檢查連線狀態)
tcp-keepalive 300
